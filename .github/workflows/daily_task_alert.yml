name: 과제 마감 알림 (매일 09:00 KST)

on:
  schedule:
    # GitHub Actions는 최대 1시간 지연이 발생할 수 있어요
    # KST 09:00 목표 → UTC 23:30 (전날) 으로 설정해서 여유를 둬요
    - cron: "30 23 * * 0-4"    # 평일(월~금) UTC 23:30 = KST 08:30~09:30 사이 도착
  workflow_dispatch:             # GitHub Actions UI에서 수동 실행 가능

jobs:
  task-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install gspread google-auth requests

      - name: 과제 관리 에이전트 실행
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID:       ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          JANDI_WEBHOOK_URL:           ${{ secrets.JANDI_WEBHOOK_URL }}
          SHEET_NAME:                  "과제목록"   # 시트 탭 이름 변경 시 여기도 수정
        run: python agents/task_manager/run.py
